AWSTemplateFormatVersion: "2010-09-09"
Description: "Creates an IAM role + EventBridge forwarding so Buckt can manage resources in your AWS account"

Parameters:
  BucktAccountId:
    Type: String
    Description: "Buckt's AWS account ID (do not modify)"
  ExternalId:
    Type: String
    Description: "Unique secret for cross-account trust (do not modify)"
    NoEcho: true
  BucktApiUrl:
    Type: String
    Description: "Buckt API base URL for ACM event forwarding (do not modify)"
  BucktWebhookSecret:
    Type: String
    Description: "Unique secret authenticating ACM events sent to Buckt (do not modify)"
    NoEcho: true

Resources:
  BucktAccessRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: BucktAccess
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${BucktAccountId}:root"
            Action: "sts:AssumeRole"
            Condition:
              StringEquals:
                "sts:ExternalId": !Ref ExternalId
      ManagedPolicyArns: []
      Policies:
        - PolicyName: BucktResourceManagement
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: S3FullAccess
                Effect: Allow
                Action: "s3:*"
                Resource: "*"
              - Sid: CloudFrontFullAccess
                Effect: Allow
                Action: "cloudfront:*"
                Resource: "*"
              - Sid: ACMFullAccess
                Effect: Allow
                Action: "acm:*"
                Resource: "*"
              - Sid: CloudWatchReadAccess
                Effect: Allow
                Action:
                  - "cloudwatch:GetMetricData"
                  - "cloudwatch:GetMetricStatistics"
                  - "cloudwatch:ListMetrics"
                Resource: "*"

  BucktAcmConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: X-Buckt-Webhook-Secret
          ApiKeyValue: !Ref BucktWebhookSecret

  BucktAcmApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      ConnectionArn: !GetAtt BucktAcmConnection.Arn
      HttpMethod: POST
      InvocationEndpoint: !Sub "${BucktApiUrl}/webhooks/acm"

  BucktAcmEventRoleExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: "sts:AssumeRole"
      Policies:
        - PolicyName: InvokeApiDestination
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: "events:InvokeApiDestination"
                Resource: !GetAtt BucktAcmApiDestination.Arn

  BucktAcmAvailableRule:
    Type: AWS::Events::Rule
    Properties:
      Description: "Forward ACM Certificate Available events to Buckt"
      EventPattern:
        source:
          - aws.acm
        detail-type:
          - "ACM Certificate Available"
        detail:
          Action:
            - ISSUANCE
      State: ENABLED
      Targets:
        - Id: BucktApiDestination
          Arn: !GetAtt BucktAcmApiDestination.Arn
          RoleArn: !GetAtt BucktAcmEventRoleExecutionRole.Arn

Outputs:
  RoleArn:
    Description: "ARN of the IAM role created for Buckt"
    Value: !GetAtt BucktAccessRole.Arn
  ExternalId:
    Description: "External ID used for cross-account trust"
    Value: !Ref ExternalId
