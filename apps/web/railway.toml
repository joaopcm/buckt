[build]
builder = "RAILPACK"
buildCommand = "pnpm --filter @buckt/web build"
watchPatterns = [
  "apps/web/**",
  "packages/db/**",
  "packages/shared/**",
  "packages/auth/**",
  "pnpm-lock.yaml",
]

[deploy]
startCommand = "HOSTNAME=0.0.0.0 node apps/web/.next/standalone/apps/web/server.js"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
