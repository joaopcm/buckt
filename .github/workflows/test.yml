name: Tests

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: buckt
          POSTGRES_PASSWORD: buckt
          POSTGRES_DB: buckt
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U buckt"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://buckt:buckt@localhost:5432/buckt
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      STRIPE_SECRET_KEY: sk_test_placeholder
      TRIGGER_SECRET_KEY: test
      ACM_WEBHOOK_SECRET: test_acm_webhook_secret_padding_abc

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run migrations
        working-directory: packages/db
        run: pnpm drizzle-kit migrate

      - name: Run tests
        run: pnpm test
