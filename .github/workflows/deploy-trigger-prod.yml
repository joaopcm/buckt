name: Deploy Trigger.dev (Production)

on:
  push:
    branches: [main]
    paths: ["apps/api/src/trigger/**", "apps/api/trigger.config.ts"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install Infisical CLI
        run: curl -1sLf 'https://artifacts-cli.infisical.com/setup.deb.sh' | sudo -E bash && sudo apt-get update && sudo apt-get install -y infisical

      - name: Authenticate with Infisical
        run: export INFISICAL_TOKEN=$(infisical login --method=universal-auth --client-id=${{ secrets.INFISICAL_CLIENT_ID }} --client-secret=${{ secrets.INFISICAL_CLIENT_SECRET }} --domain=${{ secrets.INFISICAL_HOST_URL }} --silent --plain) && echo "INFISICAL_TOKEN=$INFISICAL_TOKEN" >> $GITHUB_ENV

      - run: pnpm install --frozen-lockfile
      - name: Deploy to Trigger.dev
        working-directory: apps/api
        run: infisical run --projectId=${{ secrets.INFISICAL_PROJECT_ID }} --env=prod --domain=${{ secrets.INFISICAL_HOST_URL }} -- pnpm exec trigger deploy
