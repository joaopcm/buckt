name: Deploy Trigger.dev (Production)

on:
  push:
    branches: [main]
    paths: ["apps/api/src/trigger/**", "apps/api/trigger.config.ts"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install Infisical CLI
        run: curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' | sudo -E bash && sudo apt-get install -y infisical

      - run: pnpm install --frozen-lockfile
      - name: Deploy to Trigger.dev
        working-directory: apps/api
        run: infisical run --env=prod -- pnpm exec trigger deploy
        env:
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_PROJECT_ID }}
